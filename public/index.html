<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>CrowdLight - Entra nello Show</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .container {
      text-align: center;
      padding: 2rem;
      max-width: 400px;
      width: 100%;
    }
    .logo { font-size: 3rem; margin-bottom: 0.5rem; }
    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 0.3rem;
      background: linear-gradient(135deg, #ff6b6b, #4ecdc4, #45b7d1, #f9ca24);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .subtitle {
      color: #888;
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }
    .consent-box {
      background: #1a1a1a;
      border-radius: 12px;
      padding: 1.2rem;
      margin-bottom: 1.5rem;
      text-align: left;
      font-size: 0.8rem;
      color: #aaa;
      line-height: 1.5;
    }
    .consent-box strong { color: #fff; }
    .btn-enter {
      width: 100%;
      padding: 1rem;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, opacity 0.15s;
    }
    .btn-enter:active { transform: scale(0.97); opacity: 0.9; }
    .btn-enter:disabled { opacity: 0.4; cursor: not-allowed; }
    .check-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-top: 0.8rem;
    }
    .check-row input[type="checkbox"] {
      width: 20px; height: 20px;
      accent-color: #764ba2;
    }
    .check-row label {
      font-size: 0.85rem;
      color: #ccc;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">&#127926;</div>
    <h1>CrowdLight</h1>
    <p class="subtitle">Diventa parte dello show!</p>

    <div class="consent-box">
      <strong>Come funziona:</strong><br>
      Il tuo schermo diventerà una luce colorata controllata dalla regia dello show.
      Verrai assegnato automaticamente a un gruppo per creare effetti visivi incredibili con tutto il pubblico!
      <div class="check-row">
        <input type="checkbox" id="consent">
        <label for="consent">Accetto di partecipare allo show di luci</label>
      </div>
    </div>

    <button class="btn-enter" id="enterBtn" disabled>Entra nello Show</button>
  </div>

  <script>
    const consent = document.getElementById('consent');
    const enterBtn = document.getElementById('enterBtn');

    consent.addEventListener('change', () => {
      enterBtn.disabled = !consent.checked;
    });

    enterBtn.addEventListener('click', () => {
      window.location.href = '/client.html';
    });
  </script>
</body>
</html>
