<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CrowdLight - Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0d0d0d; color: #fff; min-height: 100vh; }
    .header { background: #151515; border-bottom: 1px solid #222; padding: 0.8rem 1.5rem; display: flex; align-items: center; justify-content: space-between; }
    .header h1 { font-size: 1.2rem; font-weight: 700; }
    .header h1 span { color: #764ba2; }
    .header-right { display: flex; align-items: center; gap: 1rem; }
    .user-name { color: #888; font-size: 0.85rem; }
    .btn-logout { padding: 0.4rem 0.8rem; border: 1px solid #333; border-radius: 6px; background: #1a1a1a; color: #ccc; cursor: pointer; font-size: 0.75rem; }
    .container { max-width: 900px; margin: 0 auto; padding: 1.5rem; }
    .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
    .top-bar h2 { font-size: 1.3rem; }
    .btn-new {
      padding: 0.6rem 1.2rem; border: none; border-radius: 10px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff; font-weight: 600; cursor: pointer; font-size: 0.9rem;
    }
    .events-list { display: grid; gap: 1rem; }
    .event-card {
      background: #151515; border: 1px solid #222; border-radius: 12px; padding: 1.2rem;
      display: grid; grid-template-columns: 1fr auto; gap: 1rem; align-items: center;
    }
    .ev-info h3 { font-size: 1rem; margin-bottom: 0.3rem; }
    .ev-meta { font-size: 0.75rem; color: #888; display: flex; gap: 1rem; flex-wrap: wrap; }
    .ev-meta .badge { padding: 2px 8px; border-radius: 4px; font-size: 0.65rem; font-weight: 600; }
    .badge-active { background: #2ecc71; color: #000; }
    .badge-inactive { background: #e74c3c; color: #fff; }
    .ev-actions { display: flex; gap: 6px; flex-wrap: wrap; }
    .btn-sm { padding: 0.35rem 0.7rem; border: 1px solid #333; border-radius: 6px; background: #1a1a1a; color: #ccc; cursor: pointer; font-size: 0.7rem; text-decoration: none; display: inline-block; }
    .btn-sm:hover { border-color: #666; }
    .btn-sm.danger { border-color: #e74c3c; color: #e74c3c; }
    .btn-sm.primary { background: #764ba2; border-color: #764ba2; color: #fff; }
    .empty { text-align: center; color: #666; padding: 3rem; }
    /* Modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 300; }
    .modal-overlay.open { display: flex; }
    .modal { background: #151515; border: 1px solid #333; border-radius: 16px; padding: 1.5rem; width: 420px; max-width: 95vw; }
    .modal h2 { font-size: 1.1rem; margin-bottom: 1rem; }
    .field { margin-bottom: 1rem; }
    .field label { display: block; font-size: 0.75rem; color: #888; margin-bottom: 0.3rem; text-transform: uppercase; }
    .field input, .field select { width: 100%; padding: 0.6rem; border-radius: 8px; border: 1px solid #333; background: #0d0d0d; color: #fff; font-size: 0.9rem; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
    .btn-cancel { padding: 0.5rem 1rem; border: 1px solid #333; border-radius: 8px; background: #1a1a1a; color: #ccc; cursor: pointer; }
    /* QR Modal */
    .qr-modal { text-align: center; }
    .qr-modal img { max-width: 256px; margin: 1rem auto; border-radius: 8px; }
    .qr-url { font-family: monospace; font-size: 0.8rem; color: #4ecdc4; word-break: break-all; margin: 0.5rem 0; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Crowd<span>Light</span></h1>
    <div class="header-right">
      <span class="user-name" id="userName"></span>
      <button class="btn-logout" id="logoutBtn">Esci</button>
    </div>
  </div>
  <div class="container">
    <div class="top-bar">
      <h2>I tuoi Eventi</h2>
      <button class="btn-new" id="newEventBtn">+ Nuovo Evento</button>
    </div>
    <div class="events-list" id="eventsList">
      <div class="empty">Caricamento...</div>
    </div>
  </div>

  <!-- New Event Modal -->
  <div class="modal-overlay" id="newEventModal">
    <div class="modal">
      <h2>Nuovo Evento</h2>
      <div class="field"><label>Nome Evento</label><input type="text" id="newEventName" placeholder="Es. Concerto Rock 2026"></div>
      <div class="field"><label>Numero Gruppi</label><input type="number" id="newEventGroups" value="10" min="1" max="50"></div>
      <div class="field"><label>Max Pubblico</label><input type="number" id="newEventAudience" value="500" min="10" max="50000" step="100"></div>
      <div class="error" id="newEventError"></div>
      <div class="modal-actions">
        <button class="btn-cancel" id="cancelNewEvent">Annulla</button>
        <button class="btn-new" id="createEventBtn">Crea Evento</button>
      </div>
    </div>
  </div>

  <!-- QR Modal -->
  <div class="modal-overlay" id="qrModal">
    <div class="modal qr-modal">
      <h2>QR Code Evento</h2>
      <img id="qrImage" src="">
      <div class="qr-url" id="qrUrl"></div>
      <div class="modal-actions" style="justify-content:center;">
        <button class="btn-cancel" id="closeQrModal">Chiudi</button>
      </div>
    </div>
  </div>

  <script src="/dashboard.js"></script>
</body>
</html>
