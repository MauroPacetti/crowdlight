<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CrowdLight - Controller</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d0d0d;
      color: #fff;
      min-height: 100vh;
    }

    /* --- Header --- */
    .header {
      background: #151515;
      border-bottom: 1px solid #222;
      padding: 0.8rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-logo { height: 32px; }
    .stats-bar { display: flex; gap: 1.5rem; align-items: center; }
    .stat { text-align: center; }
    .stat-num { font-size: 1.5rem; font-weight: 700; color: #4ecdc4; }
    .stat-label { font-size: 0.65rem; color: #888; text-transform: uppercase; letter-spacing: 0.05em; }
    .conn-dot { width: 10px; height: 10px; border-radius: 50%; background: #e74c3c; display: inline-block; }
    .conn-dot.connected { background: #2ecc71; }

    /* --- Login --- */
    .login-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.95);
      display: flex; align-items: center; justify-content: center;
      z-index: 200;
    }
    .login-overlay.hidden { display: none; }
    .login-box {
      background: #1a1a1a; padding: 2rem; border-radius: 16px;
      text-align: center; width: 320px;
    }
    .login-box h2 { margin-bottom: 1rem; font-size: 1.3rem; }
    .login-box input {
      width: 100%; padding: 0.8rem; border-radius: 8px;
      border: 1px solid #333; background: #0d0d0d; color: #fff;
      font-size: 1rem; margin-bottom: 1rem;
    }
    .login-box .error { color: #e74c3c; font-size: 0.8rem; margin-bottom: 0.5rem; display: none; }

    /* --- Panels --- */
    .panel {
      background: #151515; border: 1px solid #222;
      border-radius: 12px; padding: 1rem; margin-bottom: 0.8rem;
    }
    .panel-title {
      font-size: 0.7rem; color: #888;
      text-transform: uppercase; letter-spacing: 0.08em;
      margin-bottom: 0.8rem;
    }

    /* --- Main layout --- */
    .main {
      display: grid;
      grid-template-columns: 1fr 360px;
      gap: 1rem;
      padding: 1rem;
      max-width: 1600px;
      margin: 0 auto;
    }
    @media (max-width: 1000px) { .main { grid-template-columns: 1fr; } }

    /* --- Groups Grid --- */
    .groups-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      margin-bottom: 0.8rem;
    }
    @media (max-width: 700px) { .groups-grid { grid-template-columns: repeat(2, 1fr); } }

    .group-card {
      background: #1a1a1a;
      border: 2px solid #333;
      border-radius: 10px;
      padding: 0.6rem;
      cursor: pointer;
      transition: border-color 0.15s, transform 0.1s;
      text-align: center;
      position: relative;
    }
    .group-card:hover { border-color: #666; }
    .group-card.selected { border-color: #764ba2; box-shadow: 0 0 12px rgba(118,75,162,0.4); }
    .group-card .g-num {
      font-size: 0.7rem; color: #888;
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    .group-card .g-preview {
      width: 100%; height: 40px;
      border-radius: 6px;
      margin: 6px 0;
      border: 1px solid #333;
      background: #000;
    }
    .group-card .g-count {
      font-size: 0.7rem; color: #4ecdc4;
    }
    .group-card .g-color-label {
      font-family: monospace;
      font-size: 0.65rem;
      color: #666;
    }

    /* --- Selection bar --- */
    .selection-bar {
      display: flex;
      gap: 6px;
      margin-bottom: 0.8rem;
      flex-wrap: wrap;
    }
    .sel-btn {
      padding: 0.4rem 0.8rem;
      border: 1px solid #333;
      border-radius: 6px;
      background: #1a1a1a;
      color: #ccc;
      cursor: pointer;
      font-size: 0.75rem;
    }
    .sel-btn:hover { border-color: #666; }
    .sel-btn.active { background: #764ba2; border-color: #764ba2; color: #fff; }

    /* --- Color Picker --- */
    .color-picker-row {
      display: flex; align-items: center; gap: 1rem; margin-bottom: 0.8rem;
    }
    #colorPicker {
      width: 50px; height: 50px; border: none; border-radius: 10px;
      cursor: pointer; background: none; padding: 0;
    }
    #colorPicker::-webkit-color-swatch-wrapper { padding: 0; }
    #colorPicker::-webkit-color-swatch { border: 2px solid #333; border-radius: 8px; }
    #colorHex { font-family: monospace; font-size: 1.3rem; font-weight: 700; color: #fff; }

    /* --- Presets --- */
    .presets {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(40px, 1fr));
      gap: 6px;
      margin-bottom: 0.8rem;
    }
    .preset-btn {
      width: 100%; aspect-ratio: 1;
      border: 2px solid #333; border-radius: 8px;
      cursor: pointer; transition: transform 0.1s, border-color 0.1s;
    }
    .preset-btn:hover { transform: scale(1.1); border-color: #fff; }
    .preset-btn.active { border-color: #fff; box-shadow: 0 0 8px rgba(255,255,255,0.3); }

    /* --- Effects --- */
    .effects-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 0.8rem; }
    .effect-btn {
      padding: 0.4rem 0.8rem; border: 1px solid #333; border-radius: 8px;
      background: #1a1a1a; color: #ccc; cursor: pointer; font-size: 0.8rem;
    }
    .effect-btn:hover { border-color: #666; }
    .effect-btn.active { background: #764ba2; border-color: #764ba2; color: #fff; }

    /* --- Duration --- */
    .duration-row {
      display: flex; align-items: center; gap: 0.8rem; margin-bottom: 0.8rem;
    }
    .duration-row label { font-size: 0.8rem; color: #aaa; white-space: nowrap; }
    .duration-row input[type="range"] { flex: 1; accent-color: #764ba2; }
    .duration-row .val { font-family: monospace; color: #4ecdc4; min-width: 45px; font-size: 0.85rem; }

    /* --- Actions --- */
    .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .btn {
      padding: 0.8rem; border: none; border-radius: 10px;
      font-size: 1rem; font-weight: 600; cursor: pointer;
      transition: transform 0.1s;
    }
    .btn:active { transform: scale(0.97); }
    .btn-go {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff; grid-column: 1 / -1; font-size: 1.2rem; padding: 1rem;
    }
    .btn-blackout { background: #1a1a1a; color: #e74c3c; border: 2px solid #e74c3c; }
    .btn-white { background: #fff; color: #000; }

    /* --- ArtNet status --- */
    .artnet-status {
      font-size: 0.75rem; color: #666;
      padding: 0.5rem; text-align: center;
    }
    .artnet-status.active { color: #2ecc71; }

    /* --- Sequence --- */
    .seq-steps { margin-bottom: 0.5rem; max-height: 200px; overflow-y: auto; }
    .seq-step {
      display: flex; align-items: center; gap: 6px;
      padding: 4px 0; border-bottom: 1px solid #1a1a1a; font-size: 0.75rem;
    }
    .seq-step .swatch {
      width: 20px; height: 20px; border-radius: 4px;
      border: 1px solid #333; flex-shrink: 0;
    }
    .seq-step input {
      width: 50px; padding: 3px; border-radius: 4px;
      border: 1px solid #333; background: #0d0d0d; color: #fff;
      font-size: 0.75rem; text-align: center;
    }
    .seq-step .remove-step {
      background: none; border: none; color: #e74c3c;
      cursor: pointer; font-size: 0.9rem;
    }
    .seq-actions { display: flex; gap: 6px; }
    .btn-sm {
      padding: 0.3rem 0.6rem; border: 1px solid #333;
      border-radius: 6px; background: #1a1a1a; color: #ccc;
      cursor: pointer; font-size: 0.75rem;
    }
    .btn-sm:hover { border-color: #666; }
    .btn-sm.primary { background: #764ba2; border-color: #764ba2; color: #fff; }

    /* --- DMX Info sidebar --- */
    .dmx-map { font-size: 0.7rem; color: #666; font-family: monospace; }
    .dmx-map table { width: 100%; border-collapse: collapse; }
    .dmx-map td { padding: 2px 6px; border-bottom: 1px solid #1a1a1a; }
    .dmx-map td:first-child { color: #4ecdc4; }

    /* --- ArtNet Button --- */
    .btn-artnet {
      padding: 0.4rem 0.8rem; border-radius: 8px;
      border: 1px solid #333; background: #1a1a1a; color: #ccc;
      cursor: pointer; font-size: 0.75rem;
    }
    .btn-artnet:hover { border-color: #666; }
    .btn-artnet.active { background: #2ecc71; border-color: #2ecc71; color: #000; }

    /* --- ArtNet Modal --- */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.85);
      display: none; align-items: center; justify-content: center;
      z-index: 300;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #151515; border: 1px solid #333;
      border-radius: 16px; padding: 1.5rem;
      width: 480px; max-width: 95vw; max-height: 90vh;
      overflow-y: auto;
    }
    .modal-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 1rem; padding-bottom: 0.8rem; border-bottom: 1px solid #222;
    }
    .modal-header h2 { font-size: 1.1rem; font-weight: 700; }
    .modal-close {
      background: none; border: none; color: #888;
      font-size: 1.5rem; cursor: pointer; padding: 0 4px;
    }
    .modal-close:hover { color: #fff; }
    .modal-section { margin-bottom: 1rem; }
    .modal-section-title {
      font-size: 0.7rem; color: #888; text-transform: uppercase;
      letter-spacing: 0.08em; margin-bottom: 0.5rem;
    }
    .modal-row {
      display: flex; align-items: center; gap: 0.8rem; margin-bottom: 0.5rem;
    }
    .modal-row label { font-size: 0.8rem; color: #aaa; min-width: 90px; }
    .modal-row input[type="number"] {
      width: 80px; padding: 0.4rem; border-radius: 6px;
      border: 1px solid #333; background: #0d0d0d; color: #fff;
      font-size: 0.85rem; text-align: center;
    }
    .modal-actions { display: flex; gap: 8px; margin-bottom: 1rem; }
    .btn-artnet-start {
      padding: 0.5rem 1.2rem; border: none; border-radius: 8px;
      background: #2ecc71; color: #000; font-weight: 600;
      cursor: pointer; font-size: 0.85rem;
    }
    .btn-artnet-stop {
      padding: 0.5rem 1.2rem; border: none; border-radius: 8px;
      background: #e74c3c; color: #fff; font-weight: 600;
      cursor: pointer; font-size: 0.85rem;
    }
    .artnet-indicator {
      display: inline-block; width: 10px; height: 10px;
      border-radius: 50%; margin-right: 6px; vertical-align: middle;
    }
    .artnet-indicator.on { background: #2ecc71; }
    .artnet-indicator.off { background: #e74c3c; }
    .dmx-monitor {
      display: grid; grid-template-columns: repeat(5, 1fr);
      gap: 6px;
    }
    .dmx-fixture {
      background: #0d0d0d; border: 1px solid #222;
      border-radius: 8px; padding: 6px; text-align: center;
    }
    .dmx-fixture .f-label { font-size: 0.6rem; color: #888; margin-bottom: 4px; }
    .dmx-fixture .f-color {
      width: 100%; height: 28px; border-radius: 4px;
      border: 1px solid #333; margin-bottom: 2px;
    }
    .dmx-fixture .f-values { font-size: 0.55rem; color: #666; font-family: monospace; }
  </style>
</head>
<body>
  <!-- Login Overlay -->
  <div class="login-overlay" id="loginOverlay">
    <div class="login-box">
      <h2>CrowdLight Controller</h2>
      <p class="error" id="loginError">Token non valido</p>
      <input type="text" id="loginPass" placeholder="Token controller" autofocus>
      <button class="btn btn-go" id="loginBtn" style="width:100%">Accedi</button>
    </div>
  </div>

  <!-- Header -->
  <div class="header">
    <img src="/logo.jpg" alt="CrowdLight" class="header-logo">
    <div class="stats-bar">
      <button class="btn-artnet" id="artnetBtn">ArtNet</button>
      <div class="stat">
        <div class="stat-num" id="totalCount">0</div>
        <div class="stat-label">Connessi</div>
      </div>
      <div class="conn-dot" id="connDot"></div>
    </div>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="left-col">
      <!-- 10 Groups Visual -->
      <div class="panel">
        <div class="panel-title">Gruppi (10 fixture) — clicca per selezionare</div>
        <div class="selection-bar">
          <button class="sel-btn active" data-sel="all">TUTTI</button>
          <button class="sel-btn" data-sel="none">Nessuno</button>
          <button class="sel-btn" data-sel="odd">Dispari</button>
          <button class="sel-btn" data-sel="even">Pari</button>
        </div>
        <div class="groups-grid" id="groupsGrid"></div>
      </div>

      <!-- Color + Effect + GO -->
      <div class="panel">
        <div class="panel-title">Colore & Effetto</div>
        <div class="color-picker-row">
          <input type="color" id="colorPicker" value="#ff0000">
          <span id="colorHex">#FF0000</span>
        </div>
        <div class="presets" id="presets"></div>
        <div class="effects-row" id="effectsRow"></div>
        <div class="duration-row">
          <label>Durata</label>
          <input type="range" id="duration" min="50" max="3000" value="500" step="50">
          <span class="val" id="durationVal">500ms</span>
        </div>
      </div>

      <!-- Actions -->
      <div class="panel">
        <div class="actions">
          <button class="btn btn-go" id="goBtn">&#9654; GO (ai selezionati)</button>
          <button class="btn btn-blackout" id="blackoutBtn">BLACKOUT</button>
          <button class="btn btn-white" id="whiteBtn">BIANCO</button>
        </div>
      </div>

      <!-- Sequence -->
      <div class="panel">
        <div class="panel-title">Sequenza</div>
        <div class="seq-steps" id="seqSteps"></div>
        <div class="seq-actions">
          <button class="btn-sm" id="addStepBtn">+ Step</button>
          <button class="btn-sm primary" id="playSeqBtn">&#9654; Play</button>
          <button class="btn-sm primary" id="loopSeqBtn">&#128260; Loop</button>
          <button class="btn-sm" id="stopSeqBtn" style="display:none;background:#e74c3c;border-color:#e74c3c;color:#fff;">&#9632; Stop</button>
          <button class="btn-sm" id="clearSeqBtn">Cancella</button>
        </div>
      </div>
    </div>

    <!-- Right sidebar -->
    <div class="right-col">
      <!-- Group details -->
      <div class="panel">
        <div class="panel-title">Telefoni per gruppo</div>
        <div id="groupList"></div>
      </div>

      <!-- DMX Map -->
      <div class="panel">
        <div class="panel-title">Mappa DMX (ArtNet Bridge)</div>
        <div class="dmx-map" id="dmxMap"></div>
        <div class="artnet-status" id="artnetStatus">ArtNet Bridge: non collegato</div>
      </div>
    </div>
  </div>

  <!-- ArtNet Modal -->
  <div class="modal-overlay" id="artnetModal">
    <div class="modal">
      <div class="modal-header">
        <h2><span class="artnet-indicator off" id="artnetDot"></span> ArtNet Bridge</h2>
        <button class="modal-close" id="artnetModalClose">&times;</button>
      </div>

      <div class="modal-section">
        <div class="modal-section-title">Configurazione</div>
        <div class="modal-row">
          <label>Universe</label>
          <input type="number" id="artnetUniverse" value="0" min="0" max="32767">
        </div>
        <div class="modal-row">
          <label>Canale iniziale</label>
          <input type="number" id="artnetStartCh" value="1" min="1" max="512">
        </div>
      </div>

      <div class="modal-actions">
        <button class="btn-artnet-start" id="artnetStartBtn">Avvia Bridge</button>
        <button class="btn-artnet-stop" id="artnetStopBtn">Ferma Bridge</button>
      </div>

      <div class="modal-section">
        <div class="modal-section-title">Status</div>
        <div style="font-size:0.8rem;color:#aaa;margin-bottom:0.5rem;" id="artnetStatusText">
          Bridge inattivo
        </div>
      </div>

      <div class="modal-section">
        <div class="modal-section-title">DMX Monitor</div>
        <div class="dmx-monitor" id="dmxMonitor"></div>
      </div>

      <div class="modal-section">
        <div class="modal-section-title">Mappa Canali</div>
        <div class="dmx-map" id="artnetDmxMap"></div>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/controller.js"></script>
</body>
</html>
